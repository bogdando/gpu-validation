---
# Lightweight regression check for gpu-validation/tasks/kernel_pin.yaml last-resort vmlinuz
# resolver (mocked RPM + mocked /boot layouts).
#
# Run from this git repo checkout root directory:
#   ansible-playbook gpu-validation/playbooks/dev/kernel_pin_vmlinuz_resolver_mock.yml
#
# Requires: Ansible on controller; localhost only.

- name: Mocked RPM + /boot scans for pinned-kernel vmlinuz resolver
  hosts: localhost
  gather_facts: false
  vars:
    _resolver_script: >-
      {{ playbook_dir | dirname | dirname }}/scripts/test_kernel_pin_vmlinuz_resolve.sh

  tasks:
    - ansible.builtin.stat:
        path: "{{ _resolver_script }}"
      register: _resolver_st

    - ansible.builtin.assert:
        that:
          - _resolver_st.stat.exists
          - _resolver_st.stat.isreg
        fail_msg: Resolver test script missing at {{ _resolver_script }}

    - ansible.builtin.command:
        argv:
          - bash
          - "{{ _resolver_script }}"
      changed_when: false
