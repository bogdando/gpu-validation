---
# Optional: boot a pinned RHEL-compatible kernel inside the gpu-validation VM
# (fixes Stream-style guests on 5.14.0-*.el9 so kernel-devel aligns with EDPM 9.4).
# Requires DNF repos that ship the listed kernel RPMs (RHOSP entitlement), or enable
# gpu_validation_pin_kernel_almalinux_vault_enable / gpu_validation_pin_kernel_rocky_vault_enable
# for community EL vault mirrors (no subscription).

- name: Record currently running kernel
  ansible.builtin.command: uname -r
  register: gpu_val_kernel_running
  changed_when: false

- name: Refuse stacking multiple EL vault-compat repo presets
  when:
    - gpu_validation_pin_kernel_almalinux_vault_enable | bool
    - gpu_validation_pin_kernel_rocky_vault_enable | bool
  ansible.builtin.fail:
    msg: >-
      Enable only one compat vault preset at a time
      (_almalinux_vault_enable XOR _rocky_vault_enable), both wire BaseOS/AppStream mirrors.

- name: Resolve kernel pin from explicit package list
  ansible.builtin.assert:
    that:
      - gpu_validation_pin_kernel_boot | length > 0
    fail_msg: >-
      gpu_validation_pin_kernel_boot must be set to the exact uname -r string
      matching the kernels you install (e.g. 5.14.0-427.13.1.el9_4.x86_64).
  when:
    - gpu_validation_pin_kernel_packages | length > 0

- name: Set kernel pin specification from overrides
  when: gpu_validation_pin_kernel_packages | length > 0
  ansible.builtin.set_fact:
    _gv_kpin:
      boot: "{{ gpu_validation_pin_kernel_boot }}"
      packages: "{{ gpu_validation_pin_kernel_packages }}"
      devel_packages: "{{ gpu_validation_pin_kernel_devel_packages | default([], true) }}"

- name: Choose profile lookup key when using built-in profiles
  when: gpu_validation_pin_kernel_packages | length == 0
  ansible.builtin.set_fact:
    _gv_kpin_profile_key: >-
      {{
        gpu_validation_pin_kernel_rhel_release
        if (gpu_validation_pin_kernel_rhel_release | default('', true)) | trim | length > 0
        else (
          ansible_facts['distribution_version'] | default('')
          if gpu_validation_pin_kernel_use_facts_distribution_version | bool
          else ''
        )
      }}

- name: Use Rocky-specific profile when Rocky vault is enabled (distinct 427.* NVR from vault snapshots)
  when:
    - gpu_validation_pin_kernel_packages | length == 0
    - gpu_validation_pin_kernel_rocky_vault_enable | bool
    - (_gv_kpin_profile_key | trim) == "9.4"
    - "'9.4-rocky' in gpu_validation_pin_kernel_profiles"
  ansible.builtin.set_fact:
    _gv_kpin_profile_key: "9.4-rocky"

- name: Validate profile lookup key exists in configuration map
  when:
    - gpu_validation_pin_kernel_packages | length == 0
    - _gv_kpin_profile_key | trim | length > 0
  ansible.builtin.assert:
    that:
      - _gv_kpin_profile_key in gpu_validation_pin_kernel_profiles

- name: Validate selected profile declares kernel packages to install
  when:
    - gpu_validation_pin_kernel_packages | length == 0
    - _gv_kpin_profile_key | trim | length > 0
  ansible.builtin.assert:
    that:
      - gpu_validation_pin_kernel_profiles[_gv_kpin_profile_key]['packages'] | length > 0

- name: Set kernel pin specification from RHEL/minor profiles map
  when:
    - gpu_validation_pin_kernel_packages | length == 0
    - _gv_kpin_profile_key | trim | length > 0
    - _gv_kpin_profile_key in gpu_validation_pin_kernel_profiles
  ansible.builtin.set_fact:
    _gv_kpin: "{{ gpu_validation_pin_kernel_profiles[_gv_kpin_profile_key] }}"

- name: Fail if kernel pinning is enabled but no specification was constructed
  when: _gv_kpin is not defined
  ansible.builtin.fail:
    msg: >-
      Enable either gpu_validation_pin_kernel_rhel_release (e.g. '9.4') /
      factual auto lookup, or set gpu_validation_pin_kernel_packages +
      gpu_validation_pin_kernel_boot. RPMs must exist in enabled DNF repos —
      use RHOSP entitlement channels, AlmaLinux vault gpu_validation_pin_kernel_almalinux_vault_enable,
      OR Rocky vault gpu_validation_pin_kernel_rocky_vault_enable, then reconcile package NevRAs
      (often .alma* / .rocky* dist suffixes).

- name: Optional AlmaLinux vault repositories (RHEL-line kernels without RH subscription)
  ansible.builtin.import_tasks: kernel_pin_alma_vault.yaml
  when: gpu_validation_pin_kernel_almalinux_vault_enable | bool

- name: Optional Rocky Linux vault repositories (RHEL-line kernels without RH subscription)
  ansible.builtin.import_tasks: kernel_pin_rocky_vault.yaml
  when: gpu_validation_pin_kernel_rocky_vault_enable | bool

- name: Install pinned kernel RPMs plus matching {-devel,-headers}
  ansible.builtin.dnf:
    use_backend: dnf4
    name: "{{ (_gv_kpin.packages | default([], true))
      + (_gv_kpin.devel_packages | default([], true)) }}"
    state: present

# grubby rejects paths that do not exist. Rocky/alma kernels often use a slightly
# different /boot/vmlinuz-* basename than gpu_validation_profiles[*].boot.
- name: Check whether exact profile boot maps to installed vmlinuz
  ansible.builtin.stat:
    path: "/boot/vmlinuz-{{ (_gv_kpin.boot | trim) }}"
  register: _gv_kpin_vmlinuz_stat

- name: Use exact profile vmlinuz path when it exists on disk
  when: _gv_kpin_vmlinuz_stat.stat.exists
  ansible.builtin.set_fact:
    _gv_pin_vmlinuz_path: "/boot/vmlinuz-{{ (_gv_kpin.boot | trim) }}"

- name: Glob /boot/vmlinuz-* when profile boot string does not match on-disk name
  when: not _gv_kpin_vmlinuz_stat.stat.exists
  ansible.builtin.find:
    paths: /boot
    patterns:
      - "vmlinuz-{{ (_gv_kpin.boot | trim) }}*"
      - 'vmlinuz-{{ (_gv_kpin.boot | trim | regex_replace("\.(x86_64|aarch64|s390x|ppc64le)$", "")) }}*'
    file_type: file
  register: _gv_kpin_vmlinuz_find

- name: Pick matching vmlinuz from glob (single or lexicographic last)
  when:
    - not _gv_kpin_vmlinuz_stat.stat.exists
    - (_gv_kpin_vmlinuz_find.matched | default(0) | int) > 0
  ansible.builtin.set_fact:
    _gv_pin_vmlinuz_path: "{{ (_gv_kpin_vmlinuz_find.files | sort(attribute='path') | last).path }}"

- name: Last-resort resolve vmlinuz from kernel-* RPM file lists
  when:
    - not _gv_kpin_vmlinuz_stat.stat.exists
    - (_gv_kpin_vmlinuz_find.matched | default(0) | int) == 0
  environment:
    # Profile package names often omit ".arch"; rpm -q needs a matching NevRA wildcard.
    GV_BOOT_TAG: '{{ (_gv_kpin.boot | trim) }}'
    GV_VMLINUZ_PREFIX: '{{ (_gv_kpin.boot | trim | regex_replace("\.(x86_64|aarch64|s390x|ppc64le)$", "")) }}'
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      for spec in {% for pin_pkg in _gv_kpin.packages %}{{ pin_pkg | quote }} {% endfor %}; do
        case "$spec" in
          kernel-devel*|kernel-headers*) continue ;;
          kernel-modules-[0-9]*|kernel-modules-core-[0-9]*) continue ;;
          kernel-[0-9]*|kernel-core-[0-9]*)
            rpm_out=""
            # Exact NevRA match OR any installed package starting with this spec (e.g. +.x86_64).
            if rpm_out=$(rpm -q "$spec" 2>/dev/null); then
              :
            else
              rpm_out=$(rpm -qa "${spec}*" 2>/dev/null | grep -E '^(kernel|kernel-core)-[0-9]' || true)
            fi
            [[ -z "${rpm_out}" ]] && continue
            while IFS= read -r n; do
              [[ -z "${n}" ]] && continue
              path="$(rpm -ql "$n" 2>/dev/null | grep -xm1 '^/boot/vmlinuz-' || true)"
              if [[ -n "${path:-}" ]]; then
                printf '%s\n' "$path"
                exit 0
              fi
            done <<< "$(printf '%s\n' "${rpm_out}")"
            ;;
        esac
      done
      shopt -s nullglob
      last=""
      for p in /boot/vmlinuz-"${GV_BOOT_TAG}"* /boot/vmlinuz-"${GV_VMLINUZ_PREFIX}"*; do
        [[ -f "${p}" ]] || continue
        last="${p}"
      done
      if [[ -n "${last}" ]]; then
        printf '%s\n' "${last}"
        exit 0
      fi
      exit 1
  register: _gv_kpin_vmlinuz_rpm
  changed_when: false

- name: Set vmlinuz path from rpm payload discovery
  when:
    - not _gv_kpin_vmlinuz_stat.stat.exists
    - (_gv_kpin_vmlinuz_find.matched | default(0) | int) == 0
    - _gv_kpin_vmlinuz_rpm.rc == 0
  ansible.builtin.set_fact:
    _gv_pin_vmlinuz_path: "{{ _gv_kpin_vmlinuz_rpm.stdout | trim }}"

- name: Fail when pinned kernel vmlinuz cannot be located for grubby
  ansible.builtin.fail:
    msg: >-
      Could not resolve /boot/vmlinuz-* for pin target {{ _gv_kpin.boot | trim }}.
      Installed kernel RPMs may not match gpu_validation_pin_kernel_profiles / packages.
  when: >-
    ((_gv_pin_vmlinuz_path is not defined)
    or ((_gv_pin_vmlinuz_path | default('', true) | trim) | length == 0))

- name: Derive effective uname -r suffix from bootloader vmlinuz path
  ansible.builtin.set_fact:
    _gv_kpin_expected_boot: "{{ (_gv_pin_vmlinuz_path | basename | regex_replace('^vmlinuz-', '')) }}"

- name: Point default bootloader entry at pinned kernel
  ansible.builtin.command:
    argv:
      - grubby
      - "--set-default={{ _gv_pin_vmlinuz_path }}"
  changed_when: true

- name: Reboot VM to activate pinned kernel
  when:
    - gpu_validation_pin_kernel_reboot | bool
    - (gpu_val_kernel_running.stdout | trim) != (_gv_kpin_expected_boot | trim)
  ansible.builtin.reboot:
    reboot_timeout: "{{ gpu_validation_pin_kernel_reboot_timeout }}"

- name: Re-check running kernel matches pin target
  ansible.builtin.command: uname -r
  register: gpu_val_kernel_running_after
  changed_when: false

- name: Assert pinned kernel booted successfully
  ansible.builtin.assert:
    that:
      - (gpu_val_kernel_running_after.stdout | trim) == ((_gv_kpin_expected_boot | trim))
    fail_msg: >-
      Expected kernel {{ (_gv_kpin_expected_boot | trim) }} but VM is running
      {{ gpu_val_kernel_running_after.stdout | trim }}. Check GRUB, kernel install,
      and profile gpu_validation_pin_kernel_profiles boot string vs RPM layout.
